name: Run Content Agent Pipeline

on:
  schedule:
    - cron: '0 8 * * *' # Chạy tự động lúc 8:00 sáng mỗi ngày (giờ UTC)
  workflow_dispatch:      # Cho phép bấm chạy thủ công bằng nút "Run workflow" trên GitHub

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    # Quyền để GitHub Actions có thể đẩy code ngược lại Repo
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
        run: |
          python run.py --all

      # Tự động commit file database.db ngược trở lại GitHub để lưu dữ liệu
      - name: Commit and Push database changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add database.db
          git commit -m "chore: update database [skip ci]" || echo "No changes to commit"
          git push
